# Prometheus scrape config for crawl4ai.
# Consumed by otelcol-contrib's prometheus receiver or vmagent.
scrape_configs:
  - job_name: crawl4ai
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics
    static_configs:
      - targets:
          - "127.0.0.1:9090"  # replace with cfg.ports.metrics
        labels:
          service: crawl4ai
          host: "{{ inventory_hostname }}"
